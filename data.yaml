# Dataset configuration for Construction Site Safety dataset
# YOLOv8 format

# Dataset paths (relative to this yaml file)
train: train/images
val: valid/images
test: test/images

# Number of classes
nc: 10

# Class names
names: 
  0: Hardhat
  1: Mask
  2: NO-Hardhat
  3: NO-Mask
  4: NO-Safety Vest
  5: Person
  6: Safety Cone
  7: Safety Vest
  8: machinery
  9: vehicle