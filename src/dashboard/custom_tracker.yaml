# Tracker settings
tracker_type: bytetrack 
track_high_thresh: 0.5  # Threshold for accepting high-confidence detections as tracks
track_low_thresh: 0.1   # Threshold for accepting low-confidence detections as tracks
new_track_thresh: 0.6   # Threshold for creating new tracks from low-confidence detections
track_buffer: 600      # Frames to buffer lost tracks before deletion.
match_thresh: 0.8       # IOU threshold for matching tracks with detections
fuse_score: True 
